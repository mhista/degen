# docker-compose.yml
#
# Local development stack.
#
# SERVICES:
#   degenbot   — The Dart server (our code)
#
# NOTE: No local Postgres here — we use Supabase cloud even in dev.
#       This keeps the local setup simple (no DB to manage) and ensures
#       dev data matches production schema exactly.
#
#       If you want a fully offline setup later, you can run Supabase
#       locally with: npx supabase start
#       Then update SUPABASE_URL to http://localhost:54321
#
# USAGE:
#   docker compose up          # start (builds image if not built)
#   docker compose up --build  # rebuild after code changes
#   docker compose down        # stop and remove containers
#   docker compose logs -f     # follow logs

version: '3.9'

services:
  degenbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: degenbot
    restart: unless-stopped

    # Port mapping: host:container
    ports:
      - "8080:8080"

    # All secrets via environment variables — never hardcoded
    environment:
      # Copy from .env or set directly for dev
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-google}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SERVER_PORT=8080
      # Leave empty for polling mode in dev; set to your domain in prod
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL:-}

    # Health check — docker compose ps shows health status
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Resource limits — adjust based on your VPS
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'