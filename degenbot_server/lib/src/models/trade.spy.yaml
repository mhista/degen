##
## trade.spy.yaml — A trade (buy→sell cycle) executed by the bot.
##
## One Trade record = one full round trip: buy in, sell out (or stop-loss).
## The risk manager reads this table to enforce daily trade limits and
## calculate ROI. The user's Telegram dashboard reads it to show history.
##
## TRADER'S STRATEGY — sell rules encoded here:
##   - Track the All-Time Low (ATL) from the moment we buy.
##   - First sell when price reaches +800% from ATL (9x ATL).
##   - After first sell: watch for -80% from first-sell price → rebuy.
##   - This is NOT a fixed TP/SL — it moves with the actual price bottom.
##

class: Trade
# table: trades
fields:
  # id is integer, assigned by Supabase
  id: int?
  # Foreign key → users.id (Supabase integer PK)
  userId: int

  # The coin that was traded
  coinCandidateId: int

  # Blockchain and address for reference (denormalised for quick reads)
  chain: String
  contractAddress: String
  symbol: String

  # ── Buy side ────────────────────────────────────────────────────────────────
  # Amount of the parent token (SOL / ETH / BNB) spent on this buy
  amountSpentNative: double

  # USD equivalent at time of purchase
  amountSpentUsd: double

  # Price per token at time of purchase
  buyPriceUsd: double

  # On-chain transaction hash of the buy transaction
  buyTxHash: String?

  # When the buy executed
  boughtAt: DateTime?

  # ── Sell side ────────────────────────────────────────────────────────────────
  # Price per token at time of sale
  sellPriceUsd: double?

  # On-chain transaction hash of the sell transaction
  sellTxHash: String?

  # When the sell executed (null if trade still open)
  soldAt: DateTime?

  # ── Trader's ATL-based sell strategy ─────────────────────────────────────────
  #
  # All-time low price since this position was opened.
  # Starts at buyPriceUsd and only ever moves DOWN as price falls.
  # The first sell target is always: allTimeLowPriceUsd * 9 (= +800% from ATL).
  allTimeLowPriceUsd: double?

  # Whether the first sell (at +800% from ATL) has been executed.
  firstSellExecuted: bool?

  # The price at which the first sell was executed.
  # After this, we watch for price to drop 80% for the rebuy.
  firstSellPriceUsd: double?

  # Legacy fields — kept for backward compatibility but no longer the
  # primary strategy. takeProfitPriceUsd is now computed dynamically
  # from ATL × 9. stopLossPriceUsd remains as a backstop for catastrophic
  # drops only (e.g. -80% from entry, regardless of ATL).
  takeProfitPriceUsd: double?
  stopLossPriceUsd: double?

  # ── Outcome ──────────────────────────────────────────────────────────────────
  # Profit/loss in USD (negative = loss). Null while trade is open.
  realizedPnlUsd: double?

  # Return on investment percentage. Null while trade is open.
  roiPercent: double?

  # Why the trade closed: 'take_profit' | 'stop_loss' | 'manual' | null (open)
  closeReason: String?

  # Trade status: 'open' | 'closed' | 'failed'
  status: String

  createdAt: DateTime
  updatedAt: DateTime

indexes:
  trade_user_idx:
    fields: userId
  trade_status_idx:
    fields: status
  trade_user_date_idx:
    fields: userId, createdAt
