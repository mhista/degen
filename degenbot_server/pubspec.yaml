name: degenbot_server
description: Starting point for a Serverpod server.
# version: 1.0.0
# homepage: https://www.example.com

environment:
  sdk: '^3.8.0'

resolution: workspace


# ─────────────────────────────────────────────────────────────────────────────
# Package selection rationale
#
#  serverpod   – Lightweight Dart HTTP server. No Postgres ORM (we use
#                     Supabase for persistence), but gives us the full
#                     endpoint/model codegen pipeline, client generation, and
#                     a clean monorepo pattern that will upgrade to full
#                     Serverpod (with Flutter app) later with zero rewrites.
#
#  supabase         – Dart-native Supabase client. Talks to Postgres via REST
#                     and Realtime. We own the schema; Serverpod models are
#                     the source of truth for shapes, DTOs bridge the gap.
#
#  dartantic_ai     – Agentic AI framework. Provider-agnostic (Claude,
#                     Gemini, OpenAI). Handles multi-step tool chaining,
#                     typed outputs, streaming. This IS the AI brain.
#
#  televerse        – Telegram Bot API 9.5. Verified publisher. Built-in
#                     conversation plugin for multi-turn agentic sessions,
#                     middleware, webhook server — works headless in Docker.
#
#  on_chain         – Multi-chain blockchain SDK: Ethereum, Solana, BNB,
#                     Tron, Cardano, Aptos. One dep instead of five.
#
#  dio              – HTTP client for DexScreener, GoPlus, RugCheck,
#                     TokenSniffer, ChainGPT, Etherscan/BscScan APIs.
# ─────────────────────────────────────────────────────────────────────────────
 

dependencies:
  crypto: ^3.0.6
  dartantic_ai: ^3.4.1
  dio: ^5.9.2
  envied: ^1.3.5
  get_it: ^9.2.1
  http: ^1.6.0
  logging: ^1.3.0
  on_chain: ^8.0.0
  serverpod: 3.4.9
  supabase: ^2.13.0
  talker: ^5.1.17
  televerse: ^3.4.0

dev_dependencies:
  build_runner: ^2.15.0
  envied_generator: ^1.3.5
  lints: '>=3.0.0 <7.0.0'
  serverpod_test: 3.4.9
  test: ^1.25.5

serverpod:
  scripts:
    # Starts the server and applies migrations
    start: dart bin/main.dart --apply-migrations

    # Build the Flutter web app and copy it to the server's web directory.
    # Windows uses xcopy since flutter's --output flag doesn't work there.
    # See: https://github.com/flutter/flutter/issues/157886
    flutter_build:
      windows: >-
        (if exist web\app rmdir /S /Q web\app)
        & cd /D ..\degenbot_flutter
        && flutter build web --base-href /app/ --wasm
        && xcopy /E /I /Y build\web ..\degenbot_server\web\app
      posix: |
        cd ../degenbot_flutter
        flutter build web --base-href /app/ --wasm --output ../degenbot_server/web/app
